<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caixa da Quermesse</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f5f5f5;
  color:#333;
}

.topo{
  background:linear-gradient(90deg,#ff8a3d,#ff5f57);
  color:white;
  padding:18px 30px;
  font-size:2rem;
  font-weight:bold;
  box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
  align-items:start;
}

h2{
  margin-bottom:15px;
  color:#444;
  font-size:1.4rem;
}

.produtos{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

.produto{
  background:white;
  border:none;
  border-radius:15px;
  padding:18px 12px;
  cursor:pointer;
  transition:.2s;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
  min-height:100px;
}

.produto:hover{
  transform:translateY(-3px);
}

.produto .emoji{
  font-size:1.7rem;
  margin-bottom:8px;
}

.produto .nome{
  font-size:1rem;
  font-weight:bold;
  margin-bottom:10px;
}

.produto .preco{
  color:#ff5f57;
  font-size:1.05rem;
}

.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  margin-bottom:20px;
}

.card-topo{
  background:linear-gradient(90deg,#ff8a3d,#ff5f57);
  color:white;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:1.1rem;
  font-weight:bold;
}

.btn-limpar{
  background:white;
  border:none;
  color:#ff5f57;
  padding:8px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  font-size:.95rem;
}

.lista{
  padding:10px 18px;
  max-height:420px;
  overflow-y:auto;
}

.item{
  display:grid;
  grid-template-columns:1fr 60px 120px 40px;
  align-items:center;
  padding:14px 0;
  border-bottom:1px solid #eee;
  font-size:1rem;
  gap:10px;
}

.item-centro{
  text-align:center;
  font-weight:bold;
  opacity:.75;
}

.item div:nth-child(3){
  text-align:right;
}

.remover-btn{
  border:none;
  background:#ff5f57;
  color:white;
  width:28px;
  height:28px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:.2s;
}

.remover-btn:hover{
  transform:scale(1.08);
}

.subtotal{
  margin:14px;
  border:2px solid #ffe1d2;
  border-radius:16px;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:1.6rem;
  font-weight:bold;
  color:#ff5f57;
}

.troco{
  position:sticky;
  top:20px;
}

.conteudo{
  padding:18px;
}

label{
  font-weight:bold;
  display:block;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:13px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:.95rem;
  margin-bottom:16px;
}

.btn-calcular,
.btn-pix{
  width:100%;
  border:none;
  background:linear-gradient(90deg,#ff8a3d,#ff5f57);
  color:white;
  padding:15px;
  border-radius:14px;
  cursor:pointer;
  font-size:1rem;
  font-weight:bold;
  margin-bottom:14px;
  transition:.2s;
}

.btn-calcular:hover,
.btn-pix:hover{
  transform:translateY(-2px);
}

.resultado{
  margin-top:18px;
  border:2px solid #eee;
  border-radius:16px;
  padding:18px;
  display:none;
}

.resultado h3{
  color:#0a8f47;
  margin-bottom:18px;
  font-size:1.6rem;
}

.notas{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.nota{
  font-size:.95rem;
}

.pix-area{
  margin-top:16px;
  background:#fff7f2;
  border:2px solid #ffe1d2;
  border-radius:16px;
  padding:20px;
  text-align:center;
  display:none;
}

.pix-area img{
  width:220px;
  height:220px;
  border-radius:12px;
  margin-bottom:12px;
}

.pix-texto{
  font-size:.95rem;
  color:#666;
  word-break:break-all;
}

@media(max-width:1000px){

  .container{
    grid-template-columns:1fr;
  }

  .produtos{
    grid-template-columns:repeat(2,1fr);
  }

}

</style>
</head>

<body>

<div class="topo">
🛒 Caixa da Quermesse 🎪
</div>

<div class="container">

<div>

<h2>💼 Produtos</h2>

<div class="produtos" id="produtos"></div>

</div>

<div>

<div class="card">

<div class="card-topo">
<span>🛒 Pedido Atual</span>

<button class="btn-limpar" onclick="limparPedido()">
🗑 Limpar
</button>
</div>

<div class="lista" id="lista"></div>

<div class="subtotal">
<span>Subtotal:</span>
<span id="total">R$ 0,00</span>
</div>

</div>

<div class="card troco">

<div class="card-topo">
<span>💵 Troco e PIX</span>
</div>

<div class="conteudo">

<label>Quanto o cliente deu?</label>

<input type="number" id="valorPago" placeholder="Ex: 100">

<button class="btn-calcular" onclick="calcularTroco()">
🧮 Calcular Troco
</button>

<button class="btn-pix" onclick="gerarPix()">
📱 Gerar PIX
</button>

<div class="resultado" id="resultadoTroco">

<h3 id="valorTroco">Troco: R$ 0,00</h3>

<div class="notas" id="notasTroco"></div>

</div>

<div class="pix-area" id="pixArea">

<img id="qrPix">

<div class="pix-texto" id="pixCopia"></div>

</div>

</div>

</div>

</div>

</div>

<script>

const produtos = [
  {emoji:"🌭",nome:"Cachorro Quente",preco:12},
  {emoji:"🔥",nome:"Quentão",preco:10},
  {emoji:"🌽",nome:"Milho",preco:8},
  {emoji:"🍰",nome:"Bolo",preco:7},
  {emoji:"🥤",nome:"Refrigerante",preco:6},
  {emoji:"🧃",nome:"Suco",preco:5},
  {emoji:"💧",nome:"Água",preco:3},
  {emoji:"🎯",nome:"Brincadeira",preco:4},
  {emoji:"🍟",nome:"Batata Frita",preco:15},
  {emoji:"🥖",nome:"Pão com Linguiça",preco:14},
  {emoji:"🥟",nome:"Fogazza",preco:13},
  {emoji:"🎟️",nome:"Cartela de Bingo",preco:5}
];

let pedido=[];

const produtosDiv=document.getElementById("produtos");
const lista=document.getElementById("lista");
const totalEl=document.getElementById("total");

produtos.forEach(produto=>{

  produtosDiv.innerHTML += `

  <button class="produto"
    onclick='adicionarProduto(${JSON.stringify(produto)})'>

    <div class="emoji">${produto.emoji}</div>

    <div class="nome">${produto.nome}</div>

    <div class="preco">
      R$ ${produto.preco.toFixed(2).replace(".",",")}
    </div>

  </button>

  `;
});

function adicionarProduto(produto){

  pedido.push(produto);

  atualizarPedido();
}

function removerItem(nome){

  const index = pedido.findIndex(
    item => item.nome === nome
  );

  if(index !== -1){

    pedido.splice(index,1);

    atualizarPedido();
  }
}

function atualizarPedido(){

  lista.innerHTML="";

  let agrupados={};

  pedido.forEach(item=>{

    if(!agrupados[item.nome]){

      agrupados[item.nome]={
        quantidade:0,
        preco:item.preco,
        emoji:item.emoji
      };
    }

    agrupados[item.nome].quantidade++;
  });

  let total=0;

  for(let nome in agrupados){

    let item=agrupados[nome];

    let subtotal=item.preco*item.quantidade;

    total+=subtotal;

    lista.innerHTML += `

    <div class="item">

      <div>
        ${item.emoji} ${nome}
      </div>

      <div class="item-centro">
        x${item.quantidade}
      </div>

      <div>
        R$ ${subtotal.toFixed(2).replace(".",",")}
      </div>

      <button class="remover-btn"
        onclick="removerItem('${nome}')">
        −
      </button>

    </div>

    `;
  }

  totalEl.innerText=
  `R$ ${total.toFixed(2).replace(".",",")}`;
}

function limparPedido(){

  pedido=[];

  atualizarPedido();

  document.getElementById("resultadoTroco").style.display="none";

  document.getElementById("pixArea").style.display="none";

  document.getElementById("valorPago").value="";
}

function calcularTroco(){

  let total=0;

  pedido.forEach(item=>{
    total+=item.preco;
  });

  const pago=parseFloat(
    document.getElementById("valorPago").value
  );

  if(isNaN(pago) || pago<total){

    alert("Valor insuficiente!");
    return;
  }

  let troco=+(pago-total).toFixed(2);

  document.getElementById("resultadoTroco").style.display="block";

  document.getElementById("valorTroco").innerText=
  `Troco: R$ ${troco.toFixed(2).replace(".",",")}`;

  const notas=[100,50,20,10,5,2,1,0.50,0.25,0.10,0.05];

  let notasHTML="";

  notas.forEach(nota=>{

    let qtd=Math.floor(troco/nota);

    if(qtd>0){

      notasHTML += `
      
      <div class="nota">
        ${qtd}x R$ ${nota.toFixed(2).replace(".",",")}
      </div>
      
      `;

      troco=(troco%nota).toFixed(2);
    }

  });

  document.getElementById("notasTroco").innerHTML=notasHTML;
}

function gerarPix(){

  let total=0;

  pedido.forEach(item=>{
    total+=item.preco;
  });

  if(total<=0){

    alert("Adicione itens ao pedido!");
    return;
  }

  const chavePix="11978540688";

  const valor=total.toFixed(2);

  const payload=
  `PIX QUERMESSE | VALOR R$ ${valor} | CHAVE ${chavePix}`;

  const qrCodeUrl=
  `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(payload)}`;

  document.getElementById("pixArea").style.display="block";

  document.getElementById("qrPix").src=qrCodeUrl;

  document.getElementById("pixCopia").innerHTML=
  `
  <strong>Pagamento PIX</strong><br><br>

  Valor: R$ ${valor.replace(".",",")}<br><br>

  Chave PIX:<br>
  ${chavePix}
  `;
}

</script>

</body>
</html>
